<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor de rendimiento estudiantil</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 30px; width: 100%; max-width: 560px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; margin-bottom: 8px; color: #1a202c; }
        .subtitle { color: #718096; margin-bottom: 25px; }
        .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #a0aec0; margin: 20px 0 10px; letter-spacing: 0.5px; }
        .campo { margin-bottom: 18px; }
        label { display: block; font-weight: 600; color: #4a5568; margin-bottom: 6px; font-size: 0.9rem; }
        input[type="range"] { width: 100%; accent-color: #667eea; }
        select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; }
        button { width: 100%; padding: 14px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 15px; }
        button:hover { background: #5a67d8; }
        .resultado { margin-top: 20px; padding: 20px; border-radius: 8px; text-align: center; display: none; }
        .resultado.show { display: block; }
        .resultado.ok { background: #f0fff4; border: 1px solid #9ae6b4; }
        .puntaje { font-size: 3.5rem; font-weight: 800; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Predictor de rendimiento estudiantil</h1>
        <p class="subtitle">Ingresa los datos para estimar la calificación</p>

        <div class="section-title">Datos académicos</div>
        <div class="campo">
            <label>Horas estudiadas por semana</label>
            <input type="range" id="hours_studied" min="1" max="44" value="20" oninput="document.getElementById('hval').innerText=this.value">
            <span id="hval" style="font-weight:700;">20</span>
        </div>
        <div class="campo">
            <label>Asistencia (%)</label>
            <input type="range" id="attendance" min="60" max="100" value="80" oninput="document.getElementById('aval').innerText=this.value+'%'">
            <span id="aval" style="font-weight:700;">80%</span>
        </div>
        <div class="campo">
            <label>Puntaje anterior</label>
            <input type="range" id="previous_scores" min="50" max="100" value="75" oninput="document.getElementById('pval').innerText=this.value">
            <span id="pval" style="font-weight:700;">75</span>
        </div>

        <div class="section-title">Entorno</div>
        <div class="campo">
            <label>Parental involvement</label>
            <select id="parental_involvement">
                <option value="Low">Bajo</option>
                <option value="Medium" selected>Medio</option>
                <option value="High">Alto</option>
            </select>
        </div>
        <div class="campo">
            <label>Acceso a recursos</label>
            <select id="access_to_resources">
                <option value="Low">Bajo</option>
                <option value="Medium" selected>Medio</option>
                <option value="High">Alto</option>
            </select>
        </div>
        <div class="campo">
            <label>Motivación</label>
            <select id="motivation_level">
                <option value="Low">Baja</option>
                <option value="Medium" selected>Media</option>
                <option value="High">Alta</option>
            </select>
        </div>

        <button onclick="predecir()">Predecir calificación</button>

        <div class="resultado" id="resultado">
            <div class="puntaje" id="puntaje"></div>
        </div>
    </div>

    <script>
        async function predecir() {
            const datos = {
                hours_studied: document.getElementById("hours_studied").value,
                attendance: document.getElementById("attendance").value,
                parental_involvement: document.getElementById("parental_involvement").value,
                access_to_resources: document.getElementById("access_to_resources").value,
                previous_scores: document.getElementById("previous_scores").value,
                motivation_level: document.getElementById("motivation_level").value
            };

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(datos)
                });

                const data = await response.json();
                const box = document.getElementById("resultado");
                const puntajeEl = document.getElementById("puntaje");

                if (data.status === "ok") {
                    puntajeEl.textContent = data.prediction;
                    box.classList.add("show", "ok");
                } else {
                    puntajeEl.textContent = data.error || "Error";
                    box.classList.add("show");
                }
            } catch (error) {
                document.getElementById("puntaje").textContent = "Error de conexión";
                document.getElementById("resultado").classList.add("show");
            }
        }
    </script>
</body>
</html>
